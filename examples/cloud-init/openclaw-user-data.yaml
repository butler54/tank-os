#cloud-config
users:
  - name: openclaw
    gecos: OpenClaw
    groups:
      - wheel
    sudo:
      - ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ssh-ed25519 REPLACE_WITH_YOUR_PUBLIC_KEY tank-os

runcmd:
  - [loginctl, enable-linger, openclaw]
